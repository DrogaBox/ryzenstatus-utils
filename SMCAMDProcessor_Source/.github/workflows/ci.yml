name: CI
on:
  push: { branches: [master] }
  pull_request: { branches: [master] }

env:
  LILU_VERSION: "1.7.2"
  VSMC_VERSION: "1.3.7"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode.app" ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | tail -n1)
            if [ -n "$XCODE_PATH" ]; then
              sudo xcode-select -s "$XCODE_PATH"
            fi
          fi
          xcode-select -p
          xcodebuild -version

      - name: Fetch Dependencies
        run: |
          curl -LfsO https://github.com/acidanthera/Lilu/releases/download/${{ env.LILU_VERSION }}/Lilu-${{ env.LILU_VERSION }}-DEBUG.zip
          unzip -q -o Lilu-${{ env.LILU_VERSION }}-DEBUG.zip
          curl -LfsO https://github.com/acidanthera/VirtualSMC/releases/download/${{ env.VSMC_VERSION }}/VirtualSMC-${{ env.VSMC_VERSION }}-DEBUG.zip
          unzip -q -o VirtualSMC-${{ env.VSMC_VERSION }}-DEBUG.zip
          cp -R Kexts/VirtualSMC.kext ./ 2>/dev/null || true
          [ -d MacKernelSDK/Headers ] || git clone --depth 1 https://github.com/acidanthera/MacKernelSDK.git

      # Important: only the first scheme uses `clean`. A later `clean` wipes prior
      # products from the shared DerivedData path and broke "Package CI artifact".
      - name: Build AMDRyzenCPUPowerManagement
        run: |
          set -euo pipefail
          xcodebuild -project SMCAMDProcessor.xcodeproj \
            -scheme AMDRyzenCPUPowerManagement -configuration Release \
            ARCHS="x86_64" ONLY_ACTIVE_ARCH=NO -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO clean build
          mkdir -p build/ci-out
          cp -R build/Build/Products/Release/AMDRyzenCPUPowerManagement.kext build/ci-out/

      - name: Build SMCAMDProcessor
        run: |
          set -euo pipefail
          xcodebuild -project SMCAMDProcessor.xcodeproj \
            -scheme SMCAMDProcessor -configuration Release \
            ARCHS="x86_64" ONLY_ACTIVE_ARCH=NO -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO build
          cp -R build/Build/Products/Release/SMCAMDProcessor.kext build/ci-out/

      - name: Build AMD Power Gadget
        run: |
          set -euo pipefail
          xcodebuild -project SMCAMDProcessor.xcodeproj \
            -scheme "AMD Power Gadget" -configuration Release \
            ARCHS="x86_64" ONLY_ACTIVE_ARCH=NO -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO build
          cp -R "build/Build/Products/Release/AMD Power Gadget.app" build/ci-out/

      - name: Unit tests (AMDPowerGadgetTests)
        run: |
          xcodebuild test -project SMCAMDProcessor.xcodeproj \
            -scheme "AMD Power Gadget" -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:AMDPowerGadgetTests \
            -derivedDataPath ./build-test \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO

      # Flat package from staged products (survives multi-scheme builds).
      - name: Package CI artifact
        run: |
          set -euo pipefail
          STAGE="build/ci-out"
          test -d "${STAGE}/AMDRyzenCPUPowerManagement.kext"
          test -d "${STAGE}/SMCAMDProcessor.kext"
          test -d "${STAGE}/AMD Power Gadget.app"
          (cd "${STAGE}" && zip -ry "../ci-${{ matrix.os }}.zip" .)
          ls -lh "build/ci-${{ matrix.os }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: build/ci-${{ matrix.os }}.zip
