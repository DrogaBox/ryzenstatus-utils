name: Crowdin Sync

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # manual trigger from GitHub Actions UI

# Rapid pushes were racing Crowdin ("Another build is currently in progress").
concurrency:
  group: crowdin-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin Action
        uses: crowdin/github-action@v2
        with:
          # 1) Push English source keys from the repo
          upload_sources: true
          # 2) Push existing translations (es, de, …) so Crowdin reflects local work
          upload_translations: true
          auto_approve_imported: true
          import_eq_suggestions: true
          # 3) Pull any new translator work back into a PR branch
          download_translations: true
          create_pull_request: true
          push_translations: true
          localization_branch_name: crowdin-translations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
